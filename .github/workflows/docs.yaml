name: Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yaml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yaml"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto documentation
        run: quarto render docs

      - name: Upload rendered site
        uses: actions/upload-artifact@v4
        with:
          name: admixture-docs-site
          path: docs/_site
