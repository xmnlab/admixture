project:
  type: website
  output-dir: _site

website:
  title: "admixture"
  description: "Python wrapper around OpenADMIXTURE.jl"
  repo-url: https://github.com/osl-incubatoradmixture
  repo-actions: [source, issue]
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: installation.qmd
        text: Installation
      - href: usage.qmd
        text: Usage
      - text: Tutorials
        menu:
          - href: tutorials/index.qmd
            text: Overview
          - href: tutorials/first-analysis.qmd
            text: First analysis
          - href: tutorials/malariagen-data.qmd
            text: malariagen-data
      - href: api.qmd
        text: API
      - href: development.qmd
        text: Development
      - href: troubleshooting.qmd
        text: Troubleshooting
  sidebar:
    style: docked
    contents:
      - index.qmd
      - installation.qmd
      - usage.qmd
      - section: Tutorials
        contents:
          - tutorials/index.qmd
          - tutorials/first-analysis.qmd
          - tutorials/malariagen-data.qmd
      - api.qmd
      - development.qmd
      - troubleshooting.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    code-copy: true
    css: styles.css

execute:
  freeze: auto
